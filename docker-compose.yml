services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: oceanping
      POSTGRES_PASSWORD: oceanping
      POSTGRES_DB: oceanping
    ports:
      - "5433:5432"
    volumes:
      - dbdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oceanping -d oceanping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://oceanping:oceanping@db:5432/oceanping
      REDIS_URL: redis://redis:6379/0
      MEDIA_DIR: /data/media
      ANALYST_USERNAME: ${ANALYST_USERNAME:-analyst}
      ANALYST_PASSWORD: ${ANALYST_PASSWORD:-oceanping-dev}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      NLP_MODE: ${NLP_MODE:-embedding}
      NLP_MODEL_VERSION: ${NLP_MODEL_VERSION:-}
      ERDDAP_POLL_MINUTES: ${ERDDAP_POLL_MINUTES:-10}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      VALHALLA_URL: ${VALHALLA_URL:-http://valhalla:8002}
      # Architecture split (phase 3, milestone 8). Default "inline" is every
      # prior milestone's behavior, unchanged. Setting PIPELINE_MODE=bus here
      # AND bringing up the "split" profile (redpanda + the three consumer
      # services below) switches create_report() to gateway-only — see
      # modules/ingest/bus.py.
      PIPELINE_MODE: ${PIPELINE_MODE:-inline}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
    ports:
      - "8000:8000"
    volumes:
      - media:/data/media
      - hfcache:/root/.cache/huggingface
      - models:/srv/data/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Evacuation routing (phase 2, milestone 6). Real Valhalla, not a stub —
  # see docker/valhalla/ and scripts/routing/fetch_osm_extract.sh, which
  # downloads + clips an OSM extract to this deployment's pilot district
  # (Chennai) before this container has anything to build tiles from. First
  # start after that script runs takes a little longer (one-time tile
  # build, persisted in valhalla_tiles); every start after that is instant.
  valhalla:
    build: ./docker/valhalla
    volumes:
      - valhalla_tiles:/data/valhalla
      - ./data/osm:/data/osm:ro
    ports:
      - "8002:8002"

  # LoRaWAN / IoT pilot (phase 3, milestone 6). A real MQTT broker, not a
  # stub — EMQX is open-source and needs no credentials for a single-node
  # pilot on a private network. Nodes publish to oceanping/iot/<node>/telemetry
  # and the iot-bridge below turns that into rows in sensor_readings.
  emqx:
    image: emqx/emqx:5.8
    environment:
      EMQX_ALLOW_ANONYMOUS: "true"
    ports:
      - "1883:1883"    # MQTT
      - "18083:18083"  # dashboard (admin/public)
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 20

  iot-bridge:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://oceanping:oceanping@db:5432/oceanping
      MQTT_HOST: ${MQTT_HOST:-emqx}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      emqx:
        condition: service_healthy
    command: python -m app.modules.iot.bridge

  # Architecture split (phase 3, milestone 8). Real Redpanda (Kafka-API
  # compatible, single-node KRaft mode — no Zookeeper), not a stub, gated
  # behind an opt-in profile so the default `docker compose up -d` stays
  # exactly what every prior milestone already verified against. Bring this
  # profile up alongside PIPELINE_MODE=bus (set on `backend` above) to run
  # the split deployment: `docker compose --profile split up -d`.
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.18
    profiles: ["split"]
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 40

  # Three independent deployments of the same backend image, one per pipeline
  # stage (modules/ingest/consumers/) — the plan's own "module seams already
  # match, the split is repackaging" framing. Each is stateless and freely
  # restartable, same as the delivery worker and IoT bridge: the broker owns
  # the queue, the database owns everything else.
  nlp-consumer:
    build: ./backend
    profiles: ["split"]
    environment:
      DATABASE_URL: postgresql+psycopg://oceanping:oceanping@db:5432/oceanping
      PIPELINE_MODE: bus
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      NLP_MODE: ${NLP_MODE:-embedding}
      NLP_MODEL_VERSION: ${NLP_MODEL_VERSION:-}
    volumes:
      - hfcache:/root/.cache/huggingface
      - models:/srv/data/models
    depends_on:
      db:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: python -m app.modules.ingest.consumers.nlp

  dedup-consumer:
    build: ./backend
    profiles: ["split"]
    environment:
      DATABASE_URL: postgresql+psycopg://oceanping:oceanping@db:5432/oceanping
      PIPELINE_MODE: bus
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      db:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: python -m app.modules.ingest.consumers.dedup

  scoring-consumer:
    build: ./backend
    profiles: ["split"]
    environment:
      DATABASE_URL: postgresql+psycopg://oceanping:oceanping@db:5432/oceanping
      PIPELINE_MODE: bus
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      db:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: python -m app.modules.ingest.consumers.scoring

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://oceanping:oceanping@db:5432/oceanping
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      EXOTEL_SID: ${EXOTEL_SID:-}
      EXOTEL_TOKEN: ${EXOTEL_TOKEN:-}
      EXOTEL_FROM_NUMBER: ${EXOTEL_FROM_NUMBER:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_ADMIN_EMAIL: ${VAPID_ADMIN_EMAIL:-admin@oceanping.example}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.modules.delivery.worker

  bot:
    build: ./backend
    profiles: ["bot"]
    environment:
      DATABASE_URL: postgresql+psycopg://oceanping:oceanping@db:5432/oceanping
      REDIS_URL: redis://redis:6379/0
      MEDIA_DIR: /data/media
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      NLP_MODE: ${NLP_MODE:-embedding}
      NLP_MODEL_VERSION: ${NLP_MODEL_VERSION:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - media:/data/media
      - hfcache:/root/.cache/huggingface
      - models:/srv/data/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.modules.ingest.bot_runner

  frontend:
    build:
      context: ./frontend
      args:
        # Inlined into the client bundle at build time; browser-side fetches
        # go to the host-mapped backend port.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  dbdata:
  media:
  hfcache:
  models:
  valhalla_tiles:
